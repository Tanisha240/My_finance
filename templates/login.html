<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | My Personal Finance Management</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <!-- Brand Info -->
            <div class="auth-brand">
                <div class="logo-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#auth-logo-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="url(#auth-logo-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="url(#auth-logo-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="auth-logo-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#a855f7"/>
                                <stop offset="1" stop-color="#06b6d4"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span>My Personal Finance Management</span>
            </div>

            <!-- Tab Headers -->
            <div class="auth-tabs">
                <button class="auth-tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
                <button class="auth-tab-btn" id="tab-signup" onclick="switchAuthTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleAuthSubmit(event, 'login')">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" placeholder="Enter username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary auth-submit-btn">
                    Sign In
                </button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" onsubmit="handleAuthSubmit(event, 'signup')" class="hidden">
                <div class="form-group">
                    <label for="signup-username">Choose Username</label>
                    <input type="text" id="signup-username" placeholder="Create username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="signup-password">Choose Password</label>
                    <input type="password" id="signup-password" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="signup-currency">Default Currency</label>
                    <select id="signup-currency" required>
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                        <option value="INR">INR (₹)</option>
                        <option value="JPY">JPY (¥)</option>
                        <option value="CAD">CAD (C$)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-accent auth-submit-btn">
                    Register Account
                </button>
            </form>
        </div>
    </div>

    <!-- Toasts Container -->
    <div class="toast-container" id="auth-toast-container"></div>

    <script>
        function switchAuthTab(type) {
            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');

            if (type === 'login') {
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
            } else {
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
        }

        function showAuthToast(message, type = 'success') {
            const container = document.getElementById('auth-toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            let iconSvg = '';
            if (type === 'success') {
                iconSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            } else {
                iconSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
            }

            toast.innerHTML = `${iconSvg} <span>${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function handleAuthSubmit(e, action) {
            e.preventDefault();
            
            const payload = {};
            if (action === 'login') {
                payload.username = document.getElementById('login-username').value.trim();
                payload.password = document.getElementById('login-password').value;
            } else {
                payload.username = document.getElementById('signup-username').value.trim();
                payload.password = document.getElementById('signup-password').value;
                payload.currency = document.getElementById('signup-currency').value;
            }

            if (!payload.username || !payload.password) {
                showAuthToast("Please fill all required fields.", "error");
                return;
            }

            try {
                const endpoint = action === 'login' ? '/api/auth/login' : '/api/auth/signup';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                if (response.ok) {
                    showAuthToast(action === 'login' ? "Signed in successfully!" : "Account created successfully!");
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 800);
                } else {
                    showAuthToast(data.error || "Authentication failed.", "error");
                }
            } catch (err) {
                console.error("Auth error:", err);
                showAuthToast("Network error occurred. Try again.", "error");
            }
        }
    </script>
</body>
</html>
